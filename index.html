<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK ME! PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; animation: fadeIn 0.3s; line-height: 1.5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: bold; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border-left: 4px solid var(--gold); border-bottom-left-radius: 2px; }
        .input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; }
        .btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--gold); margin: 0;">🤖 ASK ME! PRO</h2>
    <small style="opacity: 0.8;">Salama na imara zaidi</small>
</header>

<div id="chat-box">
    <div class="msg ai">Tayari Philipo! 🚀 Baada ya kuingiza Key yako, niulize chochote hapa chini.</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Andika ujumbe...">
    <button class="btn" onclick="tumaSwali()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // Inasoma key kutoka kwenye memory ya browser yako
    let FINAL_KEY = localStorage.getItem('philipo_key');

    // Kama Key hamna, inakuuliza
    if (!FINAL_KEY) {
        FINAL_KEY = prompt("Philipo, tafadhali bandika (paste) API Key yako hapa:");
        if (FINAL_KEY) {
            localStorage.setItem('philipo_key', FINAL_KEY);
        }
    }

    async function tumaSwali() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const swali = input.value;

        if (!swali || !FINAL_KEY) return;

        box.innerHTML += `<div class="msg user">${swali}</div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FINAL_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: swali }] }]
                })
            });

            const data = await res.json();
            
            if (data.candidates && data.candidates[0].content) {
                const jibu = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="msg ai">${jibu.replace(/\n/g, '<br>')}</div>`;
            } else {
                throw new Error("Tatizo la Key");
            }
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:#ff6b6b;">Hitilafu! Inawezekana Key imefungiwa. Nenda Google AI Studio utengeneze mpya.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
