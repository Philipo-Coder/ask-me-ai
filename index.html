<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK ME! PRO | Philipo Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #1a1a1a; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1); }
        header h2 { color: var(--gold); margin: 0; letter-spacing: 2px; font-size: 22px; }
        header small { opacity: 0.7; font-weight: bold; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: bold; border-bottom-right-radius: 2px; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2); }
        .ai { align-self: flex-start; background: var(--card); border-left: 4px solid var(--gold); border-bottom-left-radius: 2px; color: white; }

        .input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; font-size: 16px; }
        input:focus { border-color: var(--gold); }

        .btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; color: black; }
        .btn:active { transform: scale(0.9); }

        .speak-btn { background: none; border: none; color: var(--gold); cursor: pointer; margin-top: 8px; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 0; }
        .loading { font-style: italic; opacity: 0.6; font-size: 13px; }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        #chat-box::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<header>
    <h2>🤖 ASK ME! PRO</h2>
    <small>Philipo Edition • 2026</small>
</header>

<div id="chat-box">
    <div class="msg ai">Habari Philipo! 🚀 Nipo tayari kukusaidia. Niulize chochote sasa hivi!</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Andika ujumbe hapa..." onkeypress="if(event.key === 'Enter') tumaSwali()">
    <button class="btn" onclick="tumaSwali()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // USALAMA: Inasoma Key kutoka kwenye memory ya simu yako badala ya kuiandika hadharani
    let FINAL_KEY = localStorage.getItem('philipo_ai_key');

    if (!FINAL_KEY) {
        FINAL_KEY = prompt("Philipo, tafadhali bandika (paste) API Key yako hapa ili kuanza:");
        if (FINAL_KEY) {
            localStorage.setItem('philipo_ai_key', FINAL_KEY);
        }
    }

    async function tumaSwali() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const swali = input.value.trim();

        if (!swali || !FINAL_KEY) return;

        // Onyesha swali la mtumiaji
        box.innerHTML += `<div class="user msg">${swali}</div>`;
        input.value = '';
        
        // Loader
        const loaderId = "loader-" + Date.now();
        box.innerHTML += `<div class="ai msg loading" id="${loaderId}">Gemini anafikiri...</div>`;
        box.scrollTop = box.scrollHeight;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FINAL_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: swali }] }]
                })
            });

            const data = await response.json();
            document.getElementById(loaderId).remove();

            if (data.candidates && data.candidates[0].content) {
                const jibu = data.candidates[0].content.parts[0].text;
                const jibuId = "ans-" + Date.now();
                
                box.innerHTML += `
                    <div class="ai msg">
                        <span id="${jibuId}">${jibu.replace(/\n/g, '<br>')}</span>
                        <button class="speak-btn" onclick="ongea('${jibuId}')">
                            <i class="fas fa-volume-up"></i> Sikiliza
                        </button>
                    </div>`;
            } else {
                throw new Error("Tatizo la muunganisho");
            }
        } catch (e) {
            if(document.getElementById(loaderId)) document.getElementById(loaderId).remove();
            box.innerHTML += `<div class="ai msg" style="color:#ff6b6b;">Samahani Philipo, kuna hitilafu. Refresh ukurasa na uhakikishe Key ni sahihi.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    function ongea(id) {
        const text = document.getElementById(id).innerText;
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'sw-TZ';
        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>
