<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASK ME! PRO | Philipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: sans-serif; background: #0a0a0a; color: white;
            display: flex; flex-direction: column; height: 100vh;
        }
        header { 
            background: #1a1a1a; padding: 15px; text-align: center; 
            border-bottom: 2px solid #FFD700; flex-shrink: 0;
        }
        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; }
        .ai { align-self: flex-start; background: #1a1a1a; border-left: 3px solid #FFD700; }
        .user { align-self: flex-end; background: #FFD700; color: black; font-weight: bold; }

        /* HAPA NDIPO PAKUANDIKIA - NIMEPARAHISISHA */
        .input-container {
            background: #1a1a1a; padding: 10px; border-top: 1px solid #333;
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        .input-box {
            flex: 1; background: #222; border-radius: 20px; padding: 5px 15px;
            display: flex; align-items: center; border: 1px solid #444;
        }
        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 10px 0; outline: none; font-size: 16px;
        }
        .btn { color: #FFD700; background: none; border: none; font-size: 20px; cursor: pointer; }
        .send { background: #FFD700; color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <h3 style="color: #FFD700; margin: 0;">🤖 ASK ME! PRO</h3>
</header>

<div id="chat-box">
    <div class="msg ai">Tayari Philipo! Sasa pakuandikia na kamera vipo hapo chini kabisa.</div>
</div>

<div class="input-container">
    <label class="btn">
        <i class="fas fa-camera"></i>
        <input type="file" accept="image/*" style="display:none" onchange="alert('Picha imechaguliwa!')">
    </label>
    
    <button class="btn" onclick="alert('Sauti inarekodi...')"><i class="fas fa-microphone"></i></button>

    <div class="input-box">
        <input type="text" id="msg-in" placeholder="Andika hapa...">
    </div>

    <button class="send" onclick="tuma()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    let key = localStorage.getItem('philipo_ai_key');
    if (!key) {
        key = prompt("Bandika API Key yako:");
        if (key) localStorage.setItem('philipo_ai_key', key);
    }

    async function tuma() {
        let box = document.getElementById('chat-box');
        let val = document.getElementById('msg-in').value;
        if(!val) return;

        box.innerHTML += `<div class="msg user">${val}</div>`;
        document.getElementById('msg-in').value = '';

        try {
            let res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: val}]}]})
            });
            let data = await res.json();
            box.innerHTML += `<div class="msg ai">${data.candidates[0].content.parts[0].text}</div>`;
        } catch(e) {
            box.innerHTML += `<div class="msg ai" style="color:red">Hitilafu! Hakikisha Key ni sahihi.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
