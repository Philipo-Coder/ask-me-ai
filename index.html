<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASK ME! PRO | Philipo Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #1a1a1a; }
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            background: var(--card); padding: 15px; text-align: center; 
            border-bottom: 2px solid var(--gold); flex-shrink: 0;
        }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 12px;
            background: var(--bg);
        }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: bold; }
        .ai { align-self: flex-start; background: var(--card); border-left: 3px solid var(--gold); }

        /* Hapa ndipo pakuandikia na pakuandikia picha/sauti */
        .controls-area {
            background: var(--card); border-top: 1px solid #333;
            padding: 10px; flex-shrink: 0;
        }

        .input-row { display: flex; align-items: center; gap: 8px; }

        .icon-btn {
            background: none; border: none; color: var(--gold);
            font-size: 20px; cursor: pointer; padding: 10px;
        }

        .input-wrapper {
            flex: 1; background: #222; border-radius: 25px;
            padding: 5px 15px; border: 1px solid #444; display: flex; align-items: center;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: white; padding: 8px 0; outline: none; font-size: 16px;
        }

        .send-btn {
            background: var(--gold); border: none; width: 42px; height: 42px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: black; cursor: pointer; flex-shrink: 0;
        }

        #preview { 
            display: none; padding: 5px; text-align: center; 
            border-bottom: 1px solid var(--gold); background: #111;
        }
        #img-tag { max-width: 60px; border: 1px solid var(--gold); border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--gold); margin: 0;">🤖 ASK ME! PRO</h2>
    <small>Philipo Edition • 2026</small>
</header>

<div id="preview">
    <img id="img-tag" src="">
    <button onclick="futaPicha()" style="background:red; color:white; border:none; border-radius:50%; margin-left:5px;">X</button>
</div>

<div id="chat-box">
    <div class="msg ai">Tayari Philipo! Sasa sehemu ya kuandikia, kamera, na sauti vipo tayari hapa chini. 👇</div>
</div>

<div class="controls-area">
    <div class="input-row">
        <label class="icon-btn">
            <i class="fas fa-camera"></i>
            <input type="file" id="picha-in" accept="image/*" style="display: none;" onchange="pichaPreview()">
        </label>

        <button class="icon-btn" onclick="rekodiSauti()">
            <i class="fas fa-microphone" id="mic-icon"></i>
        </button>

        <div class="input-wrapper">
            <input type="text" id="user-in" placeholder="Andika ujumbe...">
        </div>

        <button class="send-btn" onclick="tumaSwali()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem('philipo_ai_key');
    let base64Img = "";

    if (!API_KEY) {
        API_KEY = prompt("Philipo, tafadhali bandika API Key yako hapa:");
        if (API_KEY) localStorage.setItem('philipo_ai_key', API_KEY);
    }

    function pichaPreview() {
        const file = document.getElementById('picha-in').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            base64Img = reader.result.split(',')[1];
            document.getElementById('img-tag').src = reader.result;
            document.getElementById('preview').style.display = "block";
        };
        if (file) reader.readAsDataURL(file);
    }

    function futaPicha() {
        base64Img = "";
        document.getElementById('preview').style.display = "none";
        document.getElementById('picha-in').value = "";
    }

    // Kurekodi sauti (Speech to Text)
    function rekodiSauti() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Browser yako haisupport kurekodi sauti.");
        
        const rec = new Speech();
        rec.lang = 'sw-TZ';
        document.getElementById('mic-icon').style.color = "red";
        
        rec.onresult = (e) => {
            document.getElementById('user-in').value = e.results[0][0].transcript;
            document.getElementById('mic-icon').style.color = "#FFD700";
        };
        rec.start();
    }

    async function tumaSwali() {
        const input = document.getElementById('user-in');
        const box = document.getElementById('chat-box');
        const swali = input.value;

        if (!swali && !base64Img) return;

        box.innerHTML += `<div class="msg user">${swali || "<i>Umetuma picha</i>"}</div>`;
        input.value = '';
        const tempImg = base64Img;
        futaPicha();
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: swali || "Nieleze picha hii" },
                            ...(tempImg ? [{ inline_data: { mime_type: "image/jpeg", data: tempImg } }] : [])
                        ]
                    }]
                })
            });

            const data = await res.json();
            const jibu = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg ai">${jibu.replace(/\n/g, '<br>')}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">Kuna shida! Hakikisha Key ni sahihi.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
