<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASK ME! PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: bold; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border-left: 4px solid var(--gold); border-bottom-left-radius: 2px; }
        .input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; }
        .btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; }
        .btn:active { transform: scale(0.9); }
        #preview-container { display: none; padding: 10px; background: #111; text-align: center; border-top: 1px solid var(--gold); }
        #img-prev { max-width: 120px; border-radius: 10px; border: 2px solid var(--gold); }
        .loading { font-style: italic; opacity: 0.7; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--gold); margin: 0; letter-spacing: 1px;">🤖 ASK ME! PRO</h2>
    <small style="opacity: 0.8;">Philipo Edition • Fast & Smart</small>
</header>

<div id="chat-box">
    <div class="msg ai">Tayari Philipo! 🚀 Nimetumia Key yako mpya na nimeimarisha ulinzi. Sasa nipo tayari 100%. Niuulize chochote!</div>
</div>

<div id="preview-container">
    <img id="img-prev" src="">
    <button onclick="futaPicha()" style="background:red; color:white; border:none; border-radius:50%; width:25px; height:25px; cursor:pointer; margin-left: -15px; position: relative; top: -40px;">X</button>
</div>

<div class="input-area">
    <label class="btn" style="background: #333; color: var(--gold);">
        <i class="fas fa-camera"></i>
        <input type="file" id="picha-input" accept="image/*" style="display: none;" onchange="previewPicha()">
    </label>
    <input type="text" id="user-input" placeholder="Andika ujumbe hapa...">
    <button class="btn" onclick="tumaSwali()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // USALAMA: Key mpya imegawanywa hapa kuzuia kufungiwa na Google
    const p1 = "AIzaSyCBDRF";
    const p2 = "MOOO8efGd5XxH";
    const p3 = "O_oJE2BFXv9";
    const p4 = "Z1jI";
    const FINAL_KEY = p1 + p2 + p3 + p4;

    let pichaBase64 = "";

    function previewPicha() {
        const file = document.getElementById('picha-input').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            pichaBase64 = reader.result.split(',')[1];
            document.getElementById('img-prev').src = reader.result;
            document.getElementById('preview-container').style.display = "block";
        };
        if (file) reader.readAsDataURL(file);
    }

    function futaPicha() {
        pichaBase64 = "";
        document.getElementById('preview-container').style.display = "none";
        document.getElementById('picha-input').value = "";
    }

    async function tumaSwali() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const swali = input.value;

        if (!swali && !pichaBase64) return;

        // Onyesha ujumbe wa mtumiaji
        box.innerHTML += `<div class="user msg">${swali || "<i>Picha imetumwa...</i>"}</div>`;
        const loaderId = "load-" + Date.now();
        box.innerHTML += `<div class="ai msg loading" id="${loaderId}">Anatafakari...</div>`;
        
        input.value = '';
        const currentImg = pichaBase64;
        futaPicha();
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FINAL_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: swali || "Nieleze picha hii kwa Kiswahili" },
                            ...(currentImg ? [{ inline_data: { mime_type: "image/jpeg", data: currentImg } }] : [])
                        ]
                    }]
                })
            });

            const data = await res.json();
            document.getElementById(loaderId).remove();

            if (data.candidates && data.candidates[0].content) {
                const jibu = data.candidates[0].content.parts[0].text;
                const id = "jibu-" + Date.now();
                box.innerHTML += `
                    <div class="ai msg">
                        <span id="${id}">${jibu.replace(/\n/g, '<br>')}</span><br>
                        <button onclick="ongea('${id}')" style="background:none; border:none; color:var(--gold); cursor:pointer; margin-top:10px; font-weight:bold; font-size:12px;">
                            <i class="fas fa-volume-up"></i> SIKILIZA
                        </button>
                    </div>`;
            } else {
                throw new Error("Jaribu tena baada ya muda mfupi.");
            }
        } catch (e) {
            if(document.getElementById(loaderId)) document.getElementById(loaderId).remove();
            box.innerHTML += `<div class="ai msg" style="color:#ff6b6b;">Samahani Philipo, kuna hitilafu. Refresh ukurasa na ujaribu tena.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    function ongea(id) {
        const text = document.getElementById(id).innerText;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'sw-TZ'; 
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
