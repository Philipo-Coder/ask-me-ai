<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASK ME! PRO | Philipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #1a1a1a; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; }
        
        header { background: var(--card); padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); flex-shrink: 0; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: bold; }
        .ai { align-self: flex-start; background: var(--card); border-left: 3px solid var(--gold); }

        /* Hapa ndipo palipokuwa na shida - nimepafanya pawe imara chini */
        .input-area { background: var(--card); padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #333; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        
        .input-wrapper { flex: 1; position: relative; display: flex; align-items: center; background: #222; border-radius: 25px; padding: 0 15px; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 16px; }
        
        .btn-circle { background: var(--gold); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: black; transition: 0.2s; flex-shrink: 0; }
        .icon-btn { background: none; border: none; color: var(--gold); font-size: 18px; cursor: pointer; padding: 5px; }
        
        #preview-container { display: none; padding: 5px; background: #111; border-top: 1px solid var(--gold); text-align: center; }
        #img-prev { max-width: 80px; border-radius: 5px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <h3 style="color: var(--gold); margin: 0;">🤖 ASK ME! PRO</h3>
</header>

<div id="chat-box">
    <div class="msg ai">Tayari Philipo! Sasa sehemu ya kuandikia na kamera vipo hapo chini. Niulize chochote!</div>
</div>

<div id="preview-container">
    <img id="img-prev" src="">
    <button onclick="futaPicha()" style="background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; margin-left:-10px; cursor:pointer;">X</button>
</div>

<div class="input-area">
    <label class="icon-btn">
        <i class="fas fa-camera"></i>
        <input type="file" id="picha-input" accept="image/*" style="display: none;" onchange="previewPicha()">
    </label>
    
    <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Andika hapa..." onkeypress="if(event.key === 'Enter') tumaSwali()">
    </div>

    <button class="btn-circle" onclick="tumaSwali()">
        <i class="fas fa-paper-plane"></i>
    </button>
</div>

<script>
    let FINAL_KEY = localStorage.getItem('philipo_ai_key');
    let pichaBase64 = "";

    if (!FINAL_KEY) {
        FINAL_KEY = prompt("Philipo, bandika API Key yako hapa:");
        if (FINAL_KEY) localStorage.setItem('philipo_ai_key', FINAL_KEY);
    }

    function previewPicha() {
        const file = document.getElementById('picha-input').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            pichaBase64 = reader.result.split(',')[1];
            document.getElementById('img-prev').src = reader.result;
            document.getElementById('preview-container').style.display = "block";
        };
        if (file) reader.readAsDataURL(file);
    }

    function futaPicha() {
        pichaBase64 = "";
        document.getElementById('preview-container').style.display = "none";
        document.getElementById('picha-input').value = "";
    }

    async function tumaSwali() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const swali = input.value.trim();

        if (!swali && !pichaBase64) return;

        box.innerHTML += `<div class="msg user">${swali || "<i>Picha imetumwa</i>"}</div>`;
        input.value = '';
        const currentImg = pichaBase64;
        futaPicha();
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FINAL_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: swali || "Nieleze picha hii" },
                            ...(currentImg ? [{ inline_data: { mime_type: "image/jpeg", data: currentImg } }] : [])
                        ]
                    }]
                })
            });

            const data = await res.json();
            const jibu = data.candidates[0].content.parts[0].text;
            box.innerHTML += `<div class="msg ai">${jibu.replace(/\n/g, '<br>')}</div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">Hitilafu! Angalia Key yako.</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
