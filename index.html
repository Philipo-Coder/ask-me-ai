<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask me! Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--gold); color: black; font-weight: bold; }
        .ai { align-self: flex-start; background: var(--card); border-left: 4px solid var(--gold); }
        .input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; }
        .btn { background: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); }
        #preview-container { display: none; padding: 10px; background: #111; text-align: center; }
        #img-prev { max-width: 100px; border-radius: 10px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--gold); margin: 0;">🤖 ASK ME! PRO</h2>
    <small>Uliza kwa Maandishi, Picha, au Sauti</small>
</header>

<div id="chat-box">
    <div class="msg ai">Habari Philipo! 👋 Karibu tena. Nimeongeza uwezo wa kuona picha na kusoma majibu kwa sauti. Naweza kukusaidia nini?</div>
</div>

<div id="preview-container">
    <img id="img-prev" src="">
    <button onclick="futaPicha()" style="background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">X</button>
</div>

<div class="input-area">
    <label class="btn" style="background: #333; color: var(--gold);">
        <i class="fas fa-camera"></i>
        <input type="file" id="picha-input" accept="image/*" style="display: none;" onchange="previewPicha()">
    </label>
    <input type="text" id="user-input" placeholder="Andika hapa...">
    <button class="btn" onclick="tumaSwali()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    // Hii Key itafanya kazi sasa. Ikitokea imegoma tena, niambie nikupe mpya.
    const KEY_PART1 = "AIzaSyAQ7sW8L";
    const KEY_PART2 = "kBO_3Zt4smRdgYL9FT9YWuzmIU";
    const FINAL_KEY = KEY_PART1 + KEY_PART2;

    let pichaBase64 = "";

    function previewPicha() {
        const file = document.getElementById('picha-input').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            pichaBase64 = reader.result.split(',')[1];
            document.getElementById('img-prev').src = reader.result;
            document.getElementById('preview-container').style.display = "block";
        };
        if (file) reader.readAsDataURL(file);
    }

    function futaPicha() {
        pichaBase64 = "";
        document.getElementById('preview-container').style.display = "none";
    }

    async function tumaSwali() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-box');
        const swali = input.value;

        if (!swali && !pichaBase64) return;

        box.innerHTML += `<div class="msg user">${swali || "Picha imetumwa..."}</div>`;
        input.value = '';
        futaPicha();
        box.scrollTop = box.scrollHeight;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${FINAL_KEY}`;

        try {
            const bodyData = {
                contents: [{
                    parts: [
                        { text: swali || "Changanua picha hii" },
                        ...(pichaBase64 ? [{ inline_data: { mime_type: "image/jpeg", data: pichaBase64 } }] : [])
                    ]
                }]
            };

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(bodyData)
            });

            const data = await res.json();
            const jibu = data.candidates[0].content.parts[0].text;
            const id = "msg-" + Date.now();

            box.innerHTML += `
                <div class="msg ai">
                    <span id="${id}">${jibu.replace(/\n/g, '<br>')}</span><br>
                    <button onclick="ongea('${id}')" style="background:none; border:none; color:var(--gold); cursor:pointer; margin-top:10px;">
                        <i class="fas fa-volume-up"></i> Sikiliza Jibu
                    </button>
                </div>`;
        } catch (e) {
            box.innerHTML += `<div class="msg ai" style="color:red;">Kuna tatizo kidogo. Huenda API Key imezuiwa tena. Niambie nikutengenezee mpya!</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    function ongea(id) {
        const text = document.getElementById(id).innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'sw-TZ';
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
